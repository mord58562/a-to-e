<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ad0db"/>
      <stop offset="1" stop-color="#0a7d8a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Stethoscope refinished: short straight tubing from earpieces, then
       symmetric arch around the chest to a Y-junction, single tube to
       the diaphragm with bell + inner aperture. Stroke width balanced
       so the head and tubing read as one instrument. -->
  <g fill="none" stroke="#ffffff" stroke-width="7.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left + right arches meeting at the Y-junction. Straight 14 px
         drop from each earpiece before the curve starts. -->
    <path d="M30 22 V 40 C 30 62 44 70 64 70 C 84 70 98 62 98 40 V 22"/>
    <!-- Tubing from Y-junction to diaphragm. -->
    <path d="M64 70 V 80 Q 64 100 88 102"/>
  </g>
  <!-- Earpiece dots -->
  <circle cx="30" cy="20" r="6.5" fill="#ffffff"/>
  <circle cx="98" cy="20" r="6.5" fill="#ffffff"/>
  <!-- Diaphragm bell with inner aperture -->
  <circle cx="92" cy="102" r="13.5" fill="#ffffff"/>
  <circle cx="92" cy="102" r="6.5" fill="none" stroke="#0a7d8a" stroke-width="3.5"/>
</svg>
