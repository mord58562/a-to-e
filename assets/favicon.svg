<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1ad0db"/>
      <stop offset="1" stop-color="#0a7d8a"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="26" fill="url(#bg)"/>
  <!-- Stethoscope, proportioned 2026-06-01: earpieces brought down off
       the top edge, arch widened slightly, diaphragm bell scaled down so
       it sits within the rounded corner clear-zone, tubing tail centred
       between the Y-junction and the bell. -->
  <g fill="none" stroke="#ffffff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M34 32 V 46 C 34 66 46 76 64 76 C 82 76 94 66 94 46 V 32"/>
    <path d="M64 76 V 88 Q 64 100 84 100"/>
  </g>
  <!-- Earpiece dots -->
  <circle cx="34" cy="30" r="5.5" fill="#ffffff"/>
  <circle cx="94" cy="30" r="5.5" fill="#ffffff"/>
  <!-- Diaphragm bell with inner aperture -->
  <circle cx="86" cy="100" r="11" fill="#ffffff"/>
  <circle cx="86" cy="100" r="5" fill="none" stroke="#0a7d8a" stroke-width="3"/>
</svg>
